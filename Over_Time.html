<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>加班记录 · 打工人专用</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #5866ef;
            --accent: #9a49fa;
            --danger: #fa4856;
            --warning: #ffb902;
            --bg: #f7faff;
            --header-gradient: linear-gradient(90deg, #5668dd 0%, #a97df8 100%);
            --radius: 60px;
            --shadow: 0 4px 24px 0 #728dff33;
            --cell-bg: #eef3fb;
            --cell-holiday: #f8f2ff;
            --cell-pubholiday: #fff3e0;
            --font: "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            --progress-bg: #e7eeff;
            --overtime-bar: linear-gradient(90deg, #5668dd 0%, #6fd6fa 100%);
            --block-padding: 12px;
            --headline: 1.30em;
            --pubholiday-accent: #f0803c;
            --nav-btn-bg: #ffffff;
            --nav-btn-border: #d4dcfa;
            --nav-btn-active: #e9efff;
        }
        body {
            min-height: 100vh;
            margin: 0;
            background: var(--bg);
            font-family: var(--font);
            color: #24284f;
            position: relative;
        }
        /* 顶部一体胶囊 */
        .top-capsule {
            background: var(--header-gradient);
            border-radius: var(--radius);
            box-shadow: 0 10px 28px rgba(86,104,221,0.35), 0 4px 12px rgba(0,0,0,0.08), inset 0 2px 6px rgba(255,255,255,0.35);
            margin: 10px 16px 18px 16px;
            position: sticky;
            top: 12px;
            z-index: 10;
            display: flex;
            align-items: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .inner-small {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 8px 16px;
            margin: 6px 0 6px 8px;
            font-weight: bold;
            font-size: 1.1em;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .inner-small i { font-size: 0.9em; }
        .marquee-container {
            flex: 1;
            overflow: hidden;
            padding: 12px 8px;
        }
        .marquee-container marquee {
            font-size: var(--headline);
            font-weight: bold;
            letter-spacing: .10em;
            color: #fff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.25), 0 0 20px rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            white-space: nowrap;
        }
        main {
            max-width: 525px;
            margin: auto;
            padding: 6px 8px 18px 8px;
        }
        .progress-area {
            margin-bottom: 16px;
            position: relative;
        }
        .period-label {
            color: #4d60ad;
            font-weight: 500;
            text-align: center;
            margin: 2px 0 6px 0;
            font-size: .97em;
        }
        .period-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 8px 0 10px 0;
        }
        .period-nav button {
            background: var(--nav-btn-bg);
            border: 1.5px solid var(--nav-btn-border);
            color: var(--primary);
            border-radius: 22px;
            padding: 6px 14px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            letter-spacing: .3px;
        }
        .period-nav button:hover {
            background: var(--nav-btn-active);
            box-shadow: 0 4px 10px rgba(88,102,239,0.15);
        }
        .period-nav button:active { transform: scale(0.97); }
        .progress-bg {
            position: relative;
            width: 100%;
            height: 14px;
            background: var(--progress-bg);
            border-radius: 8px;
            overflow: visible;
            margin-bottom: 3px;
        }
        .progress-inner {
            height: 100%;
            background: var(--header-gradient);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.7, 0, 0.3, 1);
            border-radius: 8px;
            box-shadow: 0 2px 8px #7275bd2a;
            position: relative;
        }
        .progress-icon {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #ffffff;
            text-shadow: 0 0 6px rgba(86,104,221,0.8), 0 0 3px #00000055;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            pointer-events: none;
            z-index: 2;
            transition: left 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .calendar {
            background: #fff;
            border-radius: 18px;
            padding: var(--block-padding) 4px 12px 4px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
            overflow-x: auto;
            touch-action: manipulation;
        }
        .calendar-header, .calendar-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            align-items: center;
        }
        .calendar-header span {
            color: var(--primary);
            font-weight: 600;
            font-size: 1em;
            text-align: center;
            padding: 2px 0;
        }
        .calendar-cell {
            min-width: 38px;
            height: 48px;
            background: var(--cell-bg);
            margin: 1.5px 0;
            border-radius: 9px;
            font-size: 1em;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: border .16s, box-shadow .13s, background .18s;
            border: 2.2px solid transparent;
            overflow: hidden;
            user-select: none;
        }
        .calendar-cell.today { border: 2.2px solid var(--primary); }
        .calendar-cell[data-weekend="1"]:not([data-pubholiday="1"]) { background: var(--cell-holiday); }
        .calendar-cell[data-pubholiday="1"] {
            background: var(--cell-pubholiday);
            border-color: #f5cfa0;
            box-shadow: inset 0 0 0 1px #fad8b5;
        }
        .calendar-cell.custom-holiday:not([data-pubholiday="1"]):not([data-weekend="1"]) {
            background: var(--cell-holiday);
            border-color: #d5c4e0;
        }
        .cell-date {
            font-weight: 500;
            font-size: 1.05em;
            position: relative;
        }
        .cell-ot-bar-bg {
            margin-top: 0.5em;
            width: 82%;
            height: 7px;
            background: #e5e5ee;
            border-radius: 7px;
            overflow: hidden;
        }
        .cell-ot-bar {
            height: 100%;
            transition: width .25s;
            background: var(--overtime-bar);
            box-shadow: 0 1px 4px #5668dd35;
            min-width: 1.5px;
        }
        .cell-ot-bar.warn { background: var(--warning); }
        .cell-ot-bar.full { background: var(--danger); }
        .cell-ot-num {
            margin: .18em 0 0 0;
            font-size: .97em;
            color: var(--primary);
            font-weight: bold;
        }
        .cell-blank { background: none; pointer-events: none; }

        /* 三列统计卡片 */
        .stats-columns {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .stat-card {
            background: #f8faff;
            border-radius: 20px;
            padding: 10px 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: transform 0.1s;
        }
        .stat-card i {
            font-size: 1.6em;
            display: block;
            margin-bottom: 6px;
        }
        .stat-card .stat-label {
            font-size: 0.85em;
            font-weight: 500;
            color: #6c7bbd;
            margin-bottom: 4px;
        }
        .stat-card .stat-hours {
            font-size: 1.6em;
            font-weight: bold;
            color: var(--primary);
            line-height: 1.2;
        }
        .stat-card .stat-multiplier {
            font-size: 0.75em;
            color: #a0a9cf;
        }
        .total-row-salary {
            border-top: 1.5px dashed #dde3f8;
            padding-top: 12px;
            margin-top: 4px;
            font-size: 1.2em;
            text-align: center;
        }
        .summary {
            background: #fff;
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: var(--block-padding) 10px 10px 10px;
            margin-bottom: 12px;
        }
        .modal-mask {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #727e9433;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: #fff;
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 22px 24px;
            min-width: 222px;
            max-width: 93vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.07em;
            animation: fadein .22s;
        }
        @keyframes fadein {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: none; }
        }
        .modal label {
            margin-bottom: 7px;
            color: #8693e7;
            text-align: center;
            line-height: 1.5;
        }
        .modal label .pub-badge {
            display: inline-block;
            background: #fff3e0;
            color: var(--pubholiday-accent);
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: .88em;
            margin-top: 3px;
            border: 1px solid #f5cfa0;
        }
        .modal input[type='number'] {
            width: 80px;
            font-size: 1.05em;
            margin-bottom: 13px;
            padding: 4px 0 4px 7px;
            border: 1.5px solid #b3d0f8;
            background: #f6f8fd;
            border-radius: 8px;
            color: var(--primary);
        }
        .modal .modal-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .modal button {
            padding: .55em 1.7em;
            border: none;
            border-radius: 7px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            background: var(--primary);
            color: #fff;
            transition: background .19s;
        }
        .modal button.cancel { background: #b8bde4; }
        .modal .option-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin: 10px 0;
        }
        .modal .option-buttons button {
            background: #f0f4fe;
            color: var(--primary);
            border: 1px solid #b3d0f8;
            box-shadow: none;
            font-weight: normal;
        }
        .modal .option-buttons button:hover { background: #e0e8fc; }
        .chart-container {
            background: #fff;
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 14px 10px 12px 10px;
            margin-bottom: 18px;
            text-align: center;
        }
        .chart-title {
            font-size: 1em;
            color: var(--primary);
            margin-bottom: 12px;
            font-weight: 600;
        }
        canvas#weekly-chart {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            width: 100%;
            height: auto;
            background: #fefefe;
            border-radius: 12px;
        }
        .weekly-stats {
            margin-top: 12px;
            font-size: 0.94em;
            background: #f0f4fe;
            border-radius: 32px;
            padding: 8px 12px;
            color: #3b4570;
        }
        .input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }
        .input-group label {
            margin-right: 6px;
            font-size: 1em;
            color: var(--primary);
        }
        #hourly-wage {
            padding: 7px 7px 7px 8px;
            width: 82px;
            font-size: 1.06em;
            border: 1.5px solid #b3d0f8;
            border-radius: 7px;
            background: #f6f8fd;
            margin-right: 6px;
        }
        .input-group button {
            background: var(--accent);
            color: #fff;
            border-radius: 7px;
            border: none;
            padding: 7px 18px;
            font-weight: 500;
            cursor: pointer;
            margin-left: 6px;
            font-size: 1em;
            transition: background 0.2s;
        }
        .input-group button:hover { background: var(--primary); }
        .toast {
            position: fixed;
            top: 0; left: 50%;
            transform: translateX(-50%);
            background: #3b3f5c;
            color: #ffd966;
            padding: 8px 24px;
            border-radius: 0 0 16px 16px;
            font-size: 0.95em;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s, top 0.3s;
            pointer-events: none;
            box-shadow: 0 4px 12px #00000022;
        }
        .toast.show { opacity: 1; top: 10px; }
        .secret-gear {
            position: fixed;
            bottom: 16px; right: 16px;
            width: 36px; height: 36px;
            background: #eeeff8;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #5668dd;
            cursor: pointer;
            box-shadow: 0 2px 8px #a6b0e433;
            z-index: 900;
            transition: background 0.2s;
        }
        .secret-gear:hover { background: #dcdef8; }
        .secret-menu {
            position: fixed;
            bottom: 60px; right: 16px;
            background: #fff;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: none;
            flex-direction: column;
            padding: 6px 4px;
            z-index: 901;
            min-width: 120px;
        }
        .secret-menu button {
            background: transparent;
            border: none;
            padding: 10px 16px;
            text-align: left;
            font-size: 0.95em;
            color: #24284f;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .secret-menu button:hover { background: #eef3fb; }
        .secret-file-input { display: none; }
        .fa-icon-mr { margin-right: 4px; }
        .fa-icon-ml { margin-left: 4px; }
        @media (max-width:640px) {
            main { padding: 2px; }
            .calendar, .summary, .chart-container { padding: 10px 2px; }
            .calendar-cell { min-width: 17px; font-size: .94em; height: 44px; }
            .inner-small { padding: 4px 10px; font-size: 0.85em; }
            .marquee-container marquee { font-size: 1em; }
            .top-capsule { margin: 6px 10px 12px 10px; }
            .modal { padding: 20px 6vw; }
            .period-nav { gap: 6px; }
            .period-nav button { padding: 5px 10px; font-size: 0.82em; }
            canvas#weekly-chart { min-height: 200px; }
            .progress-icon { font-size: 16px; }
            .stats-columns { gap: 6px; }
            .stat-card .stat-hours { font-size: 1.3em; }
            .stat-card i { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <div class="top-capsule">
        <div class="inner-small" id="small-capsule">
            <i class="fas fa-hourglass-half"></i> <span id="total-hours-display">0h</span>
        </div>
        <div class="marquee-container">
            <marquee id="header-slogan" direction="left" scrollamount="4" behavior="scroll"></marquee>
        </div>
    </div>

    <main>
        <div class="progress-area">
            <div class="period-label" id="period-label"></div>
            <div class="period-nav">
                <button id="prev-period-btn"><i class="fas fa-chevron-left fa-icon-mr"></i>前一周期</button>
                <button id="today-period-btn"><i class="fas fa-location-dot fa-icon-mr"></i>今天</button>
                <button id="next-period-btn">后一周期<i class="fas fa-chevron-right fa-icon-ml"></i></button>
            </div>
            <div class="progress-bg" id="progress-bg">
                <div class="progress-inner" id="progress-inner"></div>
                <i id="progress-icon" class="fas fa-person-walking progress-icon"></i>
            </div>
        </div>
        <section class="calendar" id="calendar"></section>
        
        <section class="summary" id="summary">
            <div class="stats-columns" id="stats-columns"></div>
            <div class="total-row-salary" id="total-salary"></div>
        </section>
        
        <div class="chart-container" id="chart-container">
            <div class="chart-title"><i class="fas fa-chart-simple fa-icon-mr"></i>每周加班时长环比趋势</div>
            <canvas id="weekly-chart" width="500" height="240" style="width:100%; height:auto; max-width:500px; aspect-ratio:500/240"></canvas>
            <div class="weekly-stats" id="weekly-stats">
                <span id="weekly-compare-text">加载中...</span>
            </div>
        </div>

        <form class="input-group" id="wage-form" autocomplete="off">
            <label for="hourly-wage"><i class="fas fa-coins fa-icon-mr"></i>时薪(元):</label>
            <input type="number" min="1" step="1" id="hourly-wage" required>
            <button type="submit">确定</button>
        </form>
        
        <!-- 加班录入弹窗 -->
        <div class="modal-mask" id="modal-mask">
            <div class="modal" id="modal">
                <div><label id="modal-date-label"></label></div>
                <input type="number" min="0" step="0.1" id="modal-input-hours">
                <div class="modal-btns">
                    <button type="button" id="modal-save-btn">保存</button>
                    <button type="button" class="cancel" id="modal-cancel-btn">取消</button>
                </div>
            </div>
        </div>

        <!-- 自定义假日三按钮弹窗 -->
        <div class="modal-mask" id="holiday-modal-mask">
            <div class="modal" id="holiday-modal">
                <div><label id="holiday-modal-label"></label></div>
                <div class="option-buttons" id="holiday-option-buttons"></div>
                <div class="modal-btns">
                    <button type="button" class="cancel" id="holiday-modal-cancel">关闭</button>
                </div>
            </div>
        </div>
        <div class="toast" id="toast"></div>
    </main>

    <div class="secret-gear" id="secret-gear" title="数据工具"><i class="fas fa-cog"></i></div>
    <div class="secret-menu" id="secret-menu">
        <button id="backup-btn"><i class="fas fa-download fa-icon-mr"></i>备份数据</button>
        <button id="restore-btn"><i class="fas fa-upload fa-icon-mr"></i>恢复数据</button>
    </div>
    <input type="file" id="secret-file-input" class="secret-file-input" accept=".json">

    <script>
        // ========= 国定假日（预置）及用户自定义国假 =========
        const PRESET_PUBLIC_HOLIDAYS = {
            2025: ['2025-01-01','2025-01-28','2025-01-29','2025-01-30','2025-04-05','2025-05-01','2025-06-19','2025-09-27','2025-10-01','2025-10-02','2025-10-03'],
            2026: ['2026-01-01','2026-02-17','2026-02-18','2026-02-19','2026-04-05','2026-05-01','2026-06-19','2026-09-27','2026-10-01','2026-10-02','2026-10-03'],
            2027: ['2027-01-01','2027-02-06','2027-02-07','2027-02-08','2027-04-05','2027-05-01','2027-06-09','2027-09-16','2027-10-01','2027-10-02','2027-10-03']
        };
        let userPublicHolidays = new Set();
        const USER_PUBLIC_KEY = 'userPublicHolidays';
        function loadUserPublicHolidays() {
            try { const arr = JSON.parse(localStorage.getItem(USER_PUBLIC_KEY) || '[]'); userPublicHolidays = new Set(arr); } catch { userPublicHolidays = new Set(); }
        }
        function saveUserPublicHolidays() { localStorage.setItem(USER_PUBLIC_KEY, JSON.stringify([...userPublicHolidays])); }
        loadUserPublicHolidays();

        function isPublicHoliday(date) {
            const key = formatDateKey(date);
            if (userPublicHolidays.has(key)) return true;
            const holidays = PRESET_PUBLIC_HOLIDAYS[date.getFullYear()];
            return holidays ? holidays.includes(key) : false;
        }

        const CUSTOM_HOLIDAYS_KEY = 'customHolidays';
        function getCustomHolidaysSet() {
            try { return new Set(JSON.parse(localStorage.getItem(CUSTOM_HOLIDAYS_KEY) || '[]')); } catch { return new Set(); }
        }
        function saveCustomHolidaysSet(set) { localStorage.setItem(CUSTOM_HOLIDAYS_KEY, JSON.stringify([...set])); }
        let customHolidays = getCustomHolidaysSet();

        // ========= 周期相关 =========
        const PERIOD_DAYS = 31;
        function getCurrentPeriod(date = new Date()) {
            let year = date.getFullYear(), month = date.getMonth() + 1, day = date.getDate();
            let sYear = year, sMonth = month;
            if (day < 21) { sMonth--; if (sMonth < 1) { sMonth = 12; sYear--; } }
            let start = new Date(sYear, sMonth - 1, 21);
            let end = new Date(start);
            end.setDate(start.getDate() + PERIOD_DAYS - 1);
            return { start, end };
        }
        function getDaysArray(start, end) {
            const arr = [];
            const d = new Date(start);
            while (d <= end) { arr.push(new Date(d)); d.setDate(d.getDate() + 1); }
            return arr;
        }
        function isWeekend(date) { return date.getDay() === 0 || date.getDay() === 6; }
        function formatDateKey(date) {
            return [date.getFullYear(), String(date.getMonth()+1).padStart(2,'0'), String(date.getDate()).padStart(2,'0')].join('-');
        }

        // ========= 数据持久化 =========
        const STORAGE_KEY = 'overtime_v2';
        function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
        function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
        const WAGE_KEY = 'ot_wage';
        function setWage(w) { localStorage.setItem(WAGE_KEY, w); }
        function getWage() { const w = parseInt(localStorage.getItem(WAGE_KEY)); return w > 0 ? w : 30; }

        // ========= 调试模式 =========
        let debugMode = false;
        let dataToolsVisible = false;
        const topCapsule = document.querySelector('.top-capsule');
        let clickCount = 0, lastClickTime = 0;
        let secondClickCount = 0, secondLastClickTime = 0;
        const FIRST_NEEDED = 7, SECOND_NEEDED = 5, CLICK_WINDOW = 2500;

        // ========= 每周加班柱状图 =========
        function computeWeeklyHours(startDate, endDate) {
            const days = getDaysArray(startDate, endDate);
            const overtimeMap = loadData();
            const weeksMap = new Map();
            for (let d of days) {
                const dayOfWeek = d.getDay();
                const monday = new Date(d);
                const diff = (dayOfWeek === 0 ? -6 : 1 - dayOfWeek);
                monday.setDate(d.getDate() + diff);
                const weekKey = formatDateKey(monday);
                const sunday = new Date(monday);
                sunday.setDate(monday.getDate() + 6);
                if (!weeksMap.has(weekKey)) {
                    weeksMap.set(weekKey, { 
                        label: `${monday.getMonth()+1}/${monday.getDate()}~${sunday.getMonth()+1}/${sunday.getDate()}`,
                        hours: 0, start: new Date(monday), end: new Date(sunday)
                    });
                }
                const key = formatDateKey(d);
                const val = parseFloat(overtimeMap[key]?.h) || 0;
                weeksMap.get(weekKey).hours += val;
            }
            const weeks = Array.from(weeksMap.values());
            weeks.sort((a,b) => a.start - b.start);
            return weeks;
        }

        function drawWeeklyChart() {
            const canvas = document.getElementById('weekly-chart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const weeksData = computeWeeklyHours(displayPeriod.start, displayPeriod.end);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const historyWeeks = weeksData.filter(w => w.end <= today);
            let recentWeek = null, prevWeek = null;
            if (historyWeeks.length >= 1) {
                recentWeek = historyWeeks[historyWeeks.length - 1];
                if (historyWeeks.length >= 2) prevWeek = historyWeeks[historyWeeks.length - 2];
            }
            
            if (!weeksData.length) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = '13px sans-serif';
                ctx.fillStyle = '#9aa3c0';
                ctx.textAlign = 'center';
                ctx.fillText('📭 当前周期暂无加班记录', canvas.width/2, canvas.height/2);
                document.getElementById('weekly-compare-text').innerHTML = '暂无周数据';
                return;
            }
            
            const maxHours = Math.max(...weeksData.map(w => w.hours), 0.1);
            const barWidth = (canvas.width - 70) / weeksData.length * 0.7;
            const startX = 45;
            const baseY = canvas.height - 35;
            const maxHeight = canvas.height - 60;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#b8c4e6';
            ctx.lineWidth = 1;
            ctx.moveTo(30, 10);
            ctx.lineTo(30, baseY);
            ctx.lineTo(canvas.width-15, baseY);
            ctx.stroke();
            for (let i=0; i<weeksData.length; i++) {
                const w = weeksData[i];
                const h = w.hours;
                const barHeight = (h / maxHours) * maxHeight;
                const x = startX + i * (barWidth + 12);
                const y = baseY - barHeight;
                ctx.fillStyle = '#5866ef';
                ctx.fillRect(x, y, barWidth, barHeight);
                ctx.fillStyle = '#2d3c9e';
                ctx.font = '10px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText(w.label, x + barWidth/2, baseY + 12);
                ctx.fillStyle = '#4d60ad';
                ctx.fillText(h.toFixed(1)+'h', x + barWidth/2, y-3);
            }
            
            let compareHtml = '';
            if (recentWeek) {
                if (prevWeek) {
                    const diff = recentWeek.hours - prevWeek.hours;
                    let percent = 0;
                    if (prevWeek.hours > 0) percent = (diff / prevWeek.hours) * 100;
                    else if (recentWeek.hours > 0) percent = 100;
                    const symbol = diff > 0 ? '<i class="fas fa-arrow-up"></i> ' : (diff < 0 ? '<i class="fas fa-arrow-down"></i> ' : '<i class="fas fa-equals"></i> ');
                    const absPercent = Math.abs(percent).toFixed(1);
                    compareHtml = `<i class="fas fa-calendar-week"></i> 结束周（${recentWeek.label}）加班 ${recentWeek.hours.toFixed(1)}h，同比前周（${prevWeek.label}） ${symbol}${diff !==0 ? Math.abs(diff).toFixed(1)+'h' : '持平'} ${diff !==0 ? `(${symbol}${absPercent}%)` : ''}`;
                } else {
                    compareHtml = `<i class="fas fa-calendar-week"></i> 结束周（${recentWeek.label}）加班 ${recentWeek.hours.toFixed(1)}h（无更早周可比）`;
                }
            } else {
                compareHtml = '<i class="fas fa-inbox"></i> 当前周期暂无已结束的完整周数据（未来周不纳入同比）';
            }
            document.getElementById('weekly-compare-text').innerHTML = compareHtml;
        }

        // ========= 日历渲染（含进度条，支持调试模式超限显示） =========
        function renderCalendar(start, end, today) {
            const days = getDaysArray(start, end);
            let html = ['<div class="calendar-header">'+["一","二","三","四","五","六","日"].map(d=>`<span>${d}</span>`).join('')+'</div>'];
            const blanks = (days[0].getDay() + 6) % 7;
            const cells = Array(blanks).fill('').concat(days);
            const data = loadData();
            let row = [];
            for (let i = 0; i < cells.length; i++) {
                if (typeof cells[i] === 'string') {
                    row.push('<div class="calendar-cell cell-blank"></div>');
                } else {
                    const d = cells[i], key = formatDateKey(d);
                    const isPub = isPublicHoliday(d), isWk = isWeekend(d);
                    const isToday = d.toDateString() === today.toDateString();
                    const isCustom = !isPub && !isWk && customHolidays.has(key);
                    const h = data[key]?.h;
                    let bar = '', valShow = '';
                    if (h != null && h > 0) {
                        // 确定上限（仅用于比例计算，调试模式下可超限）
                        const maxLimit = (isPub || isWk || isCustom) ? 8 : 4;
                        let frac = h / maxLimit;
                        let cls = '';
                        if (debugMode && h > maxLimit) {
                            // 调试模式下超过上限，进度条满格并标记为危险
                            frac = 1;
                            cls = 'full';
                        } else {
                            cls = frac > 0.99 ? 'full' : (frac > 0.66 ? 'warn' : '');
                        }
                        const widthPercent = Math.min(frac * 100, 100);
                        bar = `<div class="cell-ot-bar-bg"><div class="cell-ot-bar ${cls}" style="width:${widthPercent}%"></div></div>`;
                        valShow = `<div class="cell-ot-num">${h}h</div>`;
                    }
                    const attrs = [isWk && !isPub ? 'data-weekend="1"' : '', isPub ? 'data-pubholiday="1"' : ''].filter(Boolean).join(' ');
                    const cls = `${isToday?' today':''}${isCustom?' custom-holiday':''}`;
                    let starIcons = '';
                    if (isPub) starIcons = `<i class="fas fa-star holiday-star" style="position:absolute; top:-7px; right:-12px; font-size:0.5em; color:var(--pubholiday-accent);"></i>`;
                    else if (isCustom) starIcons = `<i class="fas fa-star custom-star" style="position:absolute; top:-7px; right:-12px; font-size:0.5em; color:#a0a0c0; opacity:0.8;"></i>`;
                    row.push(`<div class="calendar-cell${cls}" tabindex="0" data-datekey="${key}" ${attrs} onclick="onCellClick('${key}')"><div class="cell-date" style="position:relative;">${d.getDate()}${starIcons}</div>${bar}${valShow}</div>`);
                }
                if ((i+1)%7 === 0 || i === cells.length-1) {
                    html.push(`<div class="calendar-row">${row.join('')}</div>`);
                    row = [];
                }
            }
            document.getElementById('calendar').innerHTML = html.join('');
        }

                max = Infinity;
                type = isPub ? '<span class="pub-badge"><i class="fas fa-landmark"></i> 国假 · 3倍</span>' : (isWk || isCustom) ? '<i class="fa-regular fa-sun"></i> 假日·2倍' : '<i class="fa-regular fa-moon"></i> 工作日·1.5倍';
                upperLimitText = '调试模式：无上限';
            } else {
                if (isPub) { max = 8; type = '<span class="pub-badge"><i class="fas fa-landmark"></i> 国假 · 3倍</span>'; upperLimitText = `上限${max}h`; }
                else if (isWk || isCustom) { max = 8; type = '<i class="fa-regular fa-sun"></i> 假日·2倍'; upperLimitText = `上限${max}h`; }
                else { max = 4; type = '<i class="fa-regular fa-moon"></i> 工作日·1.5倍'; upperLimitText = `上限${max}h`; }
            }
            const data = loadData();
            input.value = data[key]?.h ?? '';
            if (!debugMode) input.max = max;
            else input.removeAttribute('max');
            input.min = 0;
            label.innerHTML = `${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()} ${type}，${upperLimitText}`;
            mask.style.display = 'flex';
            input.focus(); input.select();
            window.modalSaveHandler = () => {
                let v = parseFloat(input.value) || 0;
                v = Math.max(0, v);
                if (!debugMode) v = Math.min(max, v);
                // 保留一位小数
                v = Math.round(v * 10) / 10;
                if (!data[key]) data[key] = {};
                v === 0 ? delete data[key].h : data[key].h = v;
                saveData(data);
                mask.style.display = 'none';
                render();
            };
            document.getElementById('modal-save-btn').onclick = window.modalSaveHandler;
            document.getElementById('modal-cancel-btn').onclick = () => { mask.style.display = 'none'; };
            input.onkeydown = e => { if (e.key === 'Enter') window.modalSaveHandler(); };
            mask.onclick = e => { if (e.target === mask) mask.style.display = 'none'; };
        };

        // ========= 渲染主函数 =========
        function render() {
            customHolidays = getCustomHolidaysSet();
            loadUserPublicHolidays();
            const now = new Date();
            const p = displayPeriod;
            document.getElementById('period-label').innerHTML = `考勤周期：${p.start.getFullYear()}/${p.start.getMonth()+1}/${p.start.getDate()} - ${p.end.getFullYear()}/${p.end.getMonth()+1}/${p.end.getDate()}`;
            const total = Math.round((p.end - p.start) / 86400000) + 1;
            const cur = Math.min(total, Math.max(0, Math.round((now - p.start) / 86400000) + 1));
            const percent = (cur / total) * 100;
            const progressInner = document.getElementById('progress-inner');
            progressInner.style.width = `${percent}%`;
            setTimeout(() => updateProgressIconPosition(), 10);
            renderCalendar(p.start, p.end, now);
            updateSummaryColumns(p.start, p.end);
            drawWeeklyChart();
            showWageInput();
            updateHeaderContent();
            
            const cal = document.getElementById('calendar');
            if (cal) {
                cal.removeEventListener('pointerdown', onPointerDown);
                cal.removeEventListener('pointerup', onPointerUp);
                cal.removeEventListener('pointermove', onPointerMove);
                if (debugMode) {
                    cal.addEventListener('pointerdown', onPointerDown);
                    cal.addEventListener('pointerup', onPointerUp);
                    cal.addEventListener('pointermove', onPointerMove);
                }
            }
        }
        
        render();
        window.addEventListener('resize', () => { drawWeeklyChart(); updateProgressIconPosition(); });
        document.getElementById('progress-inner').addEventListener('transitionend', updateProgressIconPosition);
    </script>
</body>
</html>
