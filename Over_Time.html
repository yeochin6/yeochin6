<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>加班记录 · 打工人专用</title>
    <style>
        :root {
            --primary: #5866ef;
            --accent: #9a49fa;
            --danger: #fa4856;
            --warning: #ffb902;
            --bg: #f7faff;
            --header-gradient: linear-gradient(90deg, #5668dd 0%, #a97df8 100%);
            --radius: 18px;
            --shadow: 0 4px 24px 0 #728dff33;
            --cell-bg: #eef3fb;
            --cell-holiday: #f8f2ff;
            --cell-pubholiday: #fff3e0;
            --font: "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            --progress-bg: #e7eeff;
            --overtime-bar: linear-gradient(90deg, #5668dd 0%, #6fd6fa 100%);
            --block-padding: 12px;
            --headline: 1.30em;
            --pubholiday-accent: #f0803c;
            --nav-btn-bg: #ffffff;
            --nav-btn-border: #d4dcfa;
            --nav-btn-active: #e9efff;
        }
        body {
            min-height: 100vh;
            margin: 0;
            background: var(--bg);
            font-family: var(--font);
            color: #24284f;
            position: relative;
        }
        header {
            background: var(--header-gradient);
            color: #fff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.25), 0 0 20px rgba(255,255,255,0.15);
            padding: 14px 26px;
            text-align: center;
            font-size: var(--headline);
            position: sticky;
            top: 12px;
            z-index: 10;
            border-radius: 60px;
            box-shadow: 0 10px 28px rgba(86,104,221,0.35), 0 4px 12px rgba(0,0,0,0.08), inset 0 2px 6px rgba(255,255,255,0.35);
            letter-spacing: .10em;
            margin: 10px 16px 18px 16px;
            user-select: none;
            overflow: hidden;
            white-space: nowrap;
            touch-action: manipulation;
            border: 1px solid rgba(255,255,255,0.25);
        }
        header marquee {
            font-size: inherit;
            font-weight: bold;
            letter-spacing: inherit;
            display: inline-block;
            width: 100%;
            white-space: nowrap;
            pointer-events: none;
        }
        main {
            max-width: 525px;
            margin: auto;
            padding: 6px 8px 18px 8px;
        }
        .progress-area {
            margin-bottom: 16px;
        }
        .period-label {
            color: #4d60ad;
            font-weight: 500;
            text-align: center;
            margin: 2px 0 6px 0;
            font-size: .97em;
        }
        .period-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 8px 0 10px 0;
        }
        .period-nav button {
            background: var(--nav-btn-bg);
            border: 1.5px solid var(--nav-btn-border);
            color: var(--primary);
            border-radius: 22px;
            padding: 6px 14px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            letter-spacing: .3px;
        }
        .period-nav button:hover {
            background: var(--nav-btn-active);
            box-shadow: 0 4px 10px rgba(88,102,239,0.15);
        }
        .period-nav button:active {
            transform: scale(0.97);
        }
        .progress-bg {
            width: 100%;
            height: 14px;
            background: var(--progress-bg);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 3px;
        }
        .progress-inner {
            height: 100%;
            background: var(--header-gradient);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.7, 0, 0.3, 1);
            border-radius: 8px;
            box-shadow: 0 2px 8px #7275bd2a;
        }
        .calendar {
            background: #fff;
            border-radius: var(--radius);
            padding: var(--block-padding) 4px 12px 4px;
            box-shadow: var(--shadow);
            margin-bottom: 18px;
            overflow-x: auto;
            touch-action: manipulation;
        }
        .calendar-header,
        .calendar-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            align-items: center;
        }
        .calendar-header span {
            color: var(--primary);
            font-weight: 600;
            font-size: 1em;
            text-align: center;
            padding: 2px 0;
            user-select: none;
        }
        .calendar-cell {
            min-width: 38px;
            height: 48px;
            background: var(--cell-bg);
            margin: 1.5px 0;
            border-radius: 9px;
            font-size: 1em;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: border .16s, box-shadow .13s, background .18s;
            border: 2.2px solid transparent;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .calendar-cell.today {
            border: 2.2px solid var(--primary);
        }
        .calendar-cell[data-weekend="1"]:not([data-pubholiday="1"]) {
            background: var(--cell-holiday);
        }
        .calendar-cell[data-pubholiday="1"] {
            background: var(--cell-pubholiday);
            border-color: #f5cfa0;
            box-shadow: inset 0 0 0 1px #fad8b5;
        }
        .calendar-cell.custom-holiday:not([data-pubholiday="1"]):not([data-weekend="1"]) {
            background: var(--cell-holiday);
            border-color: #d5c4e0;
        }
        .cell-date {
            font-weight: 500;
            font-size: 1.05em;
            position: relative;
        }
        .calendar-cell[data-pubholiday="1"] .cell-date::after {
            content: '★';
            font-size: 0.5em;
            color: var(--pubholiday-accent);
            position: absolute;
            top: -7px;
            right: -12px;
            line-height: 1;
        }
        .calendar-cell.custom-holiday .cell-date::after {
            content: '✧';
            font-size: 0.5em;
            color: #a0a0c0;
            position: absolute;
            top: -7px;
            right: -12px;
            line-height: 1;
            opacity: 0.8;
        }
        .calendar-cell[data-pubholiday="1"].custom-holiday .cell-date::after {
            content: '★';
            color: var(--pubholiday-accent);
        }
        .cell-ot-bar-bg {
            margin-top: 0.5em;
            width: 82%;
            height: 7px;
            background: #e5e5ee;
            border-radius: 7px;
            overflow: hidden;
            position: relative;
        }
        .cell-ot-bar {
            height: 100%;
            border-radius: 7px;
            transition: width .25s;
            background: var(--overtime-bar);
            box-shadow: 0 1px 4px #5668dd35;
            min-width: 1.5px;
        }
        .cell-ot-bar.warn {
            background: var(--warning);
        }
        .cell-ot-bar.full {
            background: var(--danger);
        }
        .cell-ot-num {
            margin: .18em 0 0 0;
            font-size: .97em;
            color: var(--primary);
            font-weight: bold;
            user-select: none;
            pointer-events: none;
        }
        .cell-blank {
            background: none;
            pointer-events: none;
        }
        .modal-mask {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #727e9433;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: #fff;
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 22px 24px;
            min-width: 222px;
            max-width: 93vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.07em;
            animation: fadein .22s;
        }
        @keyframes fadein {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: none; }
        }
        .modal label {
            margin-bottom: 7px;
            color: #8693e7;
            text-align: center;
            line-height: 1.5;
        }
        .modal label .pub-badge {
            display: inline-block;
            background: #fff3e0;
            color: var(--pubholiday-accent);
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: .88em;
            margin-top: 3px;
            border: 1px solid #f5cfa0;
        }
        .modal input[type='number'] {
            width: 80px;
            font-size: 1.05em;
            margin-bottom: 13px;
            padding: 4px 0 4px 7px;
            border: 1.5px solid #b3d0f8;
            background: #f6f8fd;
            border-radius: 8px;
            color: var(--primary);
        }
        .modal .modal-btns {
            display: flex;
            gap: 12px;
        }
        .modal button {
            padding: .55em 1.7em;
            border: none;
            border-radius: 7px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 3px 18px #acb5fa18;
            background: var(--primary);
            color: #fff;
            transition: background .19s;
        }
        .modal button.cancel {
            background: #b8bde4;
            color: #fff;
        }
        .summary {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            font-size: 1.09em;
            padding: var(--block-padding) 10px 10px 10px;
            margin-bottom: 12px;
            line-height: 2.16;
            text-align: center;
        }
        .summary strong {
            color: var(--primary);
            font-size: 1.21em;
        }
        .summary .pub-row strong {
            color: var(--pubholiday-accent);
        }
        .summary .total-row {
            border-top: 1.5px dashed #dde3f8;
            margin-top: 6px;
            padding-top: 8px;
        }
        .chart-container {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 14px 10px 12px 10px;
            margin-bottom: 18px;
            text-align: center;
        }
        .chart-title {
            font-size: 1em;
            color: var(--primary);
            margin-bottom: 12px;
            font-weight: 600;
        }
        canvas#weekly-chart {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            width: 100%;
            height: auto;
            background: #fefefe;
            border-radius: 12px;
        }
        .weekly-stats {
            margin-top: 12px;
            font-size: 0.94em;
            background: #f0f4fe;
            border-radius: 32px;
            padding: 8px 12px;
            color: #3b4570;
        }
        .weekly-comment {
            font-weight: 600;
            background: #fff0db;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            margin-top: 10px;
            color: #b45f1b;
            font-size: 0.9em;
        }
        .input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }
        .input-group label {
            margin-right: 6px;
            font-size: 1em;
            color: var(--primary);
        }
        #hourly-wage {
            padding: 7px 7px 7px 8px;
            width: 82px;
            font-size: 1.06em;
            border: 1.5px solid #b3d0f8;
            border-radius: 7px;
            background: #f6f8fd;
            margin-right: 6px;
        }
        .input-group button {
            background: var(--accent);
            color: #fff;
            border-radius: 7px;
            border: none;
            padding: 7px 18px;
            font-weight: 500;
            box-shadow: 0 1px 2px #4442bc14;
            cursor: pointer;
            margin-left: 6px;
            font-size: 1em;
            transition: background 0.2s;
        }
        .input-group button:hover {
            background: var(--primary);
        }
        .toast {
            position: fixed;
            top: 0; left: 50%;
            transform: translateX(-50%);
            background: #3b3f5c;
            color: #ffd966;
            padding: 8px 24px;
            border-radius: 0 0 16px 16px;
            font-size: 0.95em;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s, top 0.3s;
            pointer-events: none;
            box-shadow: 0 4px 12px #00000022;
        }
        .toast.show {
            opacity: 1; top: 10px;
        }
        .secret-gear {
            position: fixed;
            bottom: 16px; right: 16px;
            width: 36px; height: 36px;
            background: #eeeff8;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #5668dd;
            cursor: pointer;
            box-shadow: 0 2px 8px #a6b0e433;
            z-index: 900;
            transition: background 0.2s;
            user-select: none;
        }
        .secret-gear:hover { background: #dcdef8; }
        .secret-menu {
            position: fixed;
            bottom: 60px; right: 16px;
            background: #fff;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: none;
            flex-direction: column;
            padding: 6px 4px;
            z-index: 901;
            min-width: 120px;
        }
        .secret-menu button {
            background: transparent;
            border: none;
            padding: 10px 16px;
            text-align: left;
            font-size: 0.95em;
            color: #24284f;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            width: 100%;
        }
        .secret-menu button:hover { background: #eef3fb; }
        .secret-file-input { display: none; }
        @media (max-width:640px) {
            main { padding: 2px; }
            .calendar, .summary, .chart-container { padding: 10px 2px; }
            .calendar-cell { min-width: 17px; font-size: .94em; }
            header { font-size: 1.01em; margin: 6px 10px 12px 10px; padding: 12px 16px; }
            .modal { padding: 20px 6vw; }
            .period-nav { gap: 6px; }
            .period-nav button { padding: 5px 10px; font-size: 0.82em; }
            canvas#weekly-chart { min-height: 200px; }
        }
    </style>
</head>
<body>
    <header id="main-header">
        <marquee id="header-slogan" direction="left" scrollamount="4" behavior="scroll" style="width:100%; white-space:nowrap;"></marquee>
    </header>
    <main>
        <div class="progress-area">
            <div class="period-label" id="period-label"></div>
            <div class="period-nav">
                <button id="prev-period-btn" title="查看上一考勤周期">◀ 前一周期</button>
                <button id="today-period-btn" title="回到当前考勤周期">📍 今天</button>
                <button id="next-period-btn" title="查看下一考勤周期">后一周期 ▶</button>
            </div>
            <div class="progress-bg"><div class="progress-inner" id="progress-inner"></div></div>
        </div>
        <section class="calendar" id="calendar"></section>
        <section class="summary" id="summary"></section>
        
        <!-- 柱状图卡片：每周加班时长 -->
        <div class="chart-container" id="chart-container">
            <div class="chart-title">📊 每周加班时长同比增长</div>
            <canvas id="weekly-chart" width="500" height="240" style="width:100%; height:auto; max-width:500px; aspect-ratio:500/240"></canvas>
            <div class="weekly-stats" id="weekly-stats">
                <span id="weekly-compare-text">加载中...</span>
                <div class="weekly-comment" id="weekly-humor"></div>
            </div>
        </div>

        <form class="input-group" id="wage-form" autocomplete="off">
            <label for="hourly-wage">时薪(元):</label>
            <input type="number" min="1" step="1" id="hourly-wage" required>
            <button type="submit">确定</button>
        </form>
        <div class="modal-mask" id="modal-mask">
            <div class="modal" id="modal">
                <div><label id="modal-date-label"></label></div>
                <input type="number" min="0" step="0.1" id="modal-input-hours">
                <div class="modal-btns">
                    <button type="button" id="modal-save-btn">保存</button>
                    <button type="button" class="cancel" id="modal-cancel-btn">取消</button>
                </div>
            </div>
        </div>
        <div class="toast" id="toast"></div>
    </main>

    <div class="secret-gear" id="secret-gear" title="数据工具">⚜️</div>
    <div class="secret-menu" id="secret-menu">
        <button id="backup-btn">📥 备份数据</button>
        <button id="restore-btn">📤 恢复数据</button>
    </div>
    <input type="file" id="secret-file-input" class="secret-file-input" accept=".json">

    <script>
        // ========= 标语库 =========
        const slogans = [
            "今天也是努力搬砖的一天！","加班使我快乐，薪资让我心安。","打工路上，无问东西。","科技让生活更美好，钱包也更鼓。",
            "向钱看，向厚赚！","平凡岗位，闪耀青春。","努力从未被辜负，加班也得有度。","代码敲不完，薪水继续涨。",
            "工资不够，时间来凑。","打工人的世界，只有干与更干！","今天搬砖不狠，明天地位不稳！","上班精神差，来杯咖啡吧 ☕",
            "打工是为了早日退休！","摸鱼一时爽，一直摸鱼一直爽","别跟我谈理想，我的理想是不上班","只要班上得够快，寂寞就追不上我",
            "明天还得来...算了不想了","工资到手，活儿到手","不是在打工，就是在去打工的路上！","卷不过就躺，躺不住就卷！",
            "打工人，打工魂，打工都是人上人！","今天又是元气满满的一天！（骗人的）","宇宙的尽头是铁岭，人生的尽头是上班……",
            "生活不止眼前的苟且，还有读不完的文档。","别人上班是赚钱，我上班是赚气！","周一到周五，痛苦面具戴起来。","周六周日，元气恢复中...",
            "周五下午的我，已经在另一个世界了。","老板画饼我吃饼，大家都是饼中人。","工位是我的牢房，电脑是我的镣铐。",
            "下班不积极，思想有问题。","今天的工作已经做完了吗？没有。但我饿了！","打工可能会少活十年，不打工你连命都不想要。",
            "世界上最远的距离是周一到周五。","我爱工作，工作使我快乐（假的）…"
        ];
        function randomSlogan() { document.getElementById('header-slogan').innerText = slogans[Math.floor(Math.random() * slogans.length)]; }
        randomSlogan();

        // ========= 国定假日 =========
        const PUBLIC_HOLIDAYS = {
            2025: ['2025-01-01','2025-01-28','2025-01-29','2025-01-30','2025-04-05','2025-05-01','2025-06-19','2025-09-27','2025-10-01','2025-10-02','2025-10-03'],
            2026: ['2026-01-01','2026-02-17','2026-02-18','2026-02-19','2026-04-05','2026-05-01','2026-06-19','2026-09-27','2026-10-01','2026-10-02','2026-10-03'],
            2027: ['2027-01-01','2027-02-06','2027-02-07','2027-02-08','2027-04-05','2027-05-01','2027-06-09','2027-09-16','2027-10-01','2027-10-02','2027-10-03']
        };
        function isPublicHoliday(date) {
            const holidays = PUBLIC_HOLIDAYS[date.getFullYear()];
            return holidays ? holidays.includes(formatDateKey(date)) : false;
        }

        // ========= 考勤周期 =========
        const PERIOD_DAYS = 31;
        function getCurrentPeriod(date = new Date()) {
            let year = date.getFullYear(), month = date.getMonth() + 1, day = date.getDate();
            let sYear = year, sMonth = month;
            if (day < 21) { sMonth--; if (sMonth < 1) { sMonth = 12; sYear--; } }
            let start = new Date(sYear, sMonth - 1, 21);
            let end = new Date(start);
            end.setDate(start.getDate() + PERIOD_DAYS - 1);
            return { start, end };
        }
        function getDaysArray(start, end) {
            const arr = [];
            const d = new Date(start);
            while (d <= end) { arr.push(new Date(d)); d.setDate(d.getDate() + 1); }
            return arr;
        }
        function isWeekend(date) { return date.getDay() === 0 || date.getDay() === 6; }
        function formatDateKey(date) {
            return [date.getFullYear(), String(date.getMonth()+1).padStart(2,'0'), String(date.getDate()).padStart(2,'0')].join('-');
        }

        // ========= 持久化 =========
        const STORAGE_KEY = 'overtime_v2';
        function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
        function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
        const WAGE_KEY = 'ot_wage';
        function setWage(w) { localStorage.setItem(WAGE_KEY, w); }
        function getWage() { const w = parseInt(localStorage.getItem(WAGE_KEY)); return w > 0 ? w : 30; }

        const CUSTOM_HOLIDAYS_KEY = 'customHolidays';
        function getCustomHolidaysSet() {
            try { return new Set(JSON.parse(localStorage.getItem(CUSTOM_HOLIDAYS_KEY) || '[]')); } catch { return new Set(); }
        }
        function saveCustomHolidaysSet(set) { localStorage.setItem(CUSTOM_HOLIDAYS_KEY, JSON.stringify([...set])); }
        let customHolidays = getCustomHolidaysSet();

        function isNearHoliday(date) {
            if (isWeekend(date) || isPublicHoliday(date)) return false;
            const oneDay = 86400000;
            for (let i = 1; i <= 5; i++) {
                if (isWeekend(new Date(date.getTime() - i * oneDay)) || isPublicHoliday(new Date(date.getTime() - i * oneDay))) return true;
                if (isWeekend(new Date(date.getTime() + i * oneDay)) || isPublicHoliday(new Date(date.getTime() + i * oneDay))) return true;
            }
            return false;
        }

        // ========= 标题连击彩蛋 =========
        let holidayMarkEnabled = false, dataToolsVisible = false;
        const header = document.getElementById('main-header');
        let clickCount = 0, lastClickTime = 0;
        let secondClickCount = 0, secondLastClickTime = 0;
        const FIRST_NEEDED = 7, SECOND_NEEDED = 5, CLICK_WINDOW = 2500;
        header.addEventListener('pointerdown', function(e) {
            if (e.target.closest('#main-header') !== header) return;
            const now = Date.now();
            if (!holidayMarkEnabled) {
                if (now - lastClickTime > CLICK_WINDOW) clickCount = 1;
                else clickCount++;
                lastClickTime = now;
                if (clickCount >= FIRST_NEEDED) {
                    holidayMarkEnabled = true;
                    clickCount = 0;
                    showToast('🔧 高级设置已就绪');
                    e.preventDefault();
                }
                return;
            }
            if (!dataToolsVisible) {
                if (now - secondLastClickTime > CLICK_WINDOW) secondClickCount = 1;
                else secondClickCount++;
                secondLastClickTime = now;
                if (secondClickCount >= SECOND_NEEDED) {
                    dataToolsVisible = true;
                    secondClickCount = 0;
                    showToast('📦 数据工具已就绪');
                    document.getElementById('secret-gear').style.display = 'flex';
                    e.preventDefault();
                }
            }
        });
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ========= 齿轮备份恢复 =========
        const gear = document.getElementById('secret-gear'), menu = document.getElementById('secret-menu'), fileInput = document.getElementById('secret-file-input');
        gear.addEventListener('click', e => { e.stopPropagation(); menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex'; });
        document.addEventListener('click', () => { menu.style.display = 'none'; });
        menu.addEventListener('click', e => e.stopPropagation());
        document.getElementById('backup-btn').addEventListener('click', () => {
            const data = { overtime: loadData(), customHolidays: [...getCustomHolidaysSet()], wage: getWage() };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const a = document.createElement('a');
            a.download = `加班备份_${new Date().toISOString().slice(0,10)}.json`;
            a.href = URL.createObjectURL(blob);
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('✅ 数据已备份');
            menu.style.display = 'none';
        });
        document.getElementById('restore-btn').addEventListener('click', () => { fileInput.click(); menu.style.display = 'none'; });
        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const backup = JSON.parse(ev.target.result);
                    if (backup.overtime) saveData(backup.overtime);
                    if (backup.customHolidays) saveCustomHolidaysSet(new Set(backup.customHolidays));
                    if (typeof backup.wage === 'number' && backup.wage > 0) setWage(backup.wage);
                    showToast('✅ 数据已恢复');
                    setTimeout(() => location.reload(), 500);
                } catch { alert('文件格式不正确'); }
            };
            reader.readAsText(file);
            fileInput.value = '';
        });

        // 周期切换逻辑
        let displayPeriod = getCurrentPeriod();
        function goToPeriod(startDate) {
            const endDate = new Date(startDate);
            endDate.setDate(startDate.getDate() + PERIOD_DAYS - 1);
            displayPeriod = { start: new Date(startDate), end: endDate };
            render();
        }
        function getPrevPeriodStart(cur) {
            let y = cur.getFullYear(), m = cur.getMonth() - 1;
            if (m < 0) { m = 11; y--; }
            return new Date(y, m, 21);
        }
        function getNextPeriodStart(cur) {
            let y = cur.getFullYear(), m = cur.getMonth() + 1;
            if (m > 11) { m = 0; y++; }
            return new Date(y, m, 21);
        }
        document.getElementById('prev-period-btn').addEventListener('click', () => goToPeriod(getPrevPeriodStart(displayPeriod.start)));
        document.getElementById('next-period-btn').addEventListener('click', () => goToPeriod(getNextPeriodStart(displayPeriod.start)));
        document.getElementById('today-period-btn').addEventListener('click', () => { displayPeriod = getCurrentPeriod(); render(); });

        // 长按假日逻辑 (保留)
        let longPressTimer = null, longPressStartPos = { x:0, y:0 };
        const LONG_PRESS_DURATION = 600, MOVE_THRESHOLD = 10;
        let preventNextClickUntil = 0;

        function onPointerDown(e) {
            if (!holidayMarkEnabled) return;
            const cell = e.target.closest('.calendar-cell');
            if (!cell || cell.classList.contains('cell-blank')) return;
            const dateKey = cell.dataset.datekey;
            if (!dateKey) return;
            const date = new Date(dateKey + 'T00:00:00');
            if (!isNearHoliday(date) && !customHolidays.has(dateKey)) return;
            if (isPublicHoliday(date) || isWeekend(date)) return;
            longPressStartPos = { x: e.clientX, y: e.clientY };
            longPressTimer = setTimeout(() => {
                if (customHolidays.has(dateKey)) {
                    if (confirm('取消将该日计为假日（恢复普通工作日）？')) {
                        customHolidays.delete(dateKey);
                        saveCustomHolidaysSet(customHolidays);
                        render(); showToast('已恢复为工作日');
                    }
                } else {
                    if (confirm('将该日计为假日（2倍）？')) {
                        customHolidays.add(dateKey);
                        saveCustomHolidaysSet(customHolidays);
                        render(); showToast('已设为假日（2倍）');
                    }
                }
                longPressTimer = null;
            }, LONG_PRESS_DURATION);
        }
        function onPointerUp() { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } }
        function onPointerMove(e) { if (longPressTimer && (Math.abs(e.clientX - longPressStartPos.x) > MOVE_THRESHOLD || Math.abs(e.clientY - longPressStartPos.y) > MOVE_THRESHOLD)) { clearTimeout(longPressTimer); longPressTimer = null; } }
        function cancelLongPress() { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } }

        // ========= 核心：每周加班时长柱状图（修正同比逻辑，基于已结束周）=========
        function computeWeeklyHours(startDate, endDate) {
            const days = getDaysArray(startDate, endDate);
            const overtimeMap = loadData();
            const weeksMap = new Map(); // key: 周一日期字符串 -> { label, hours, start, end }
            for (let d of days) {
                const dayOfWeek = d.getDay(); // 0周日
                const monday = new Date(d);
                const diff = (dayOfWeek === 0 ? -6 : 1 - dayOfWeek);
                monday.setDate(d.getDate() + diff);
                const weekKey = formatDateKey(monday);
                const sunday = new Date(monday);
                sunday.setDate(monday.getDate() + 6);
                if (!weeksMap.has(weekKey)) {
                    weeksMap.set(weekKey, { 
                        label: `${monday.getMonth()+1}/${monday.getDate()}~${sunday.getMonth()+1}/${sunday.getDate()}`,
                        hours: 0, start: new Date(monday), end: new Date(sunday)
                    });
                }
                const key = formatDateKey(d);
                const val = parseFloat(overtimeMap[key]?.h) || 0;
                weeksMap.get(weekKey).hours += val;
            }
            const weeks = Array.from(weeksMap.values());
            weeks.sort((a,b) => a.start - b.start);
            return weeks;
        }

        function getHumorousComment(changePercent) {
            if (isNaN(changePercent)) return "✨ 摸鱼躺平，岁月静好 ✨";
            if (changePercent > 30) return "🔥 爆肝预警！下周请多喝枸杞 🔥";
            if (changePercent > 10) return "⚠️ 奋斗逼上线，注意身体 ⚠️";
            if (changePercent > 0) return "📈 稳中带卷，建议周末晒个太阳 🌞";
            if (changePercent === 0) return "🐢 加班量和上周一模一样，稳如老狗 🐢";
            if (changePercent < -30) return "🎉 功德圆满！下周可以合理摸鱼啦 🎉";
            if (changePercent < -10) return "🍃 效率飞升，加班锐减，赞！ 🍃";
            return "🍵 劳逸结合，打工人的自我修养 🍵";
        }

        function drawWeeklyChart() {
            const canvas = document.getElementById('weekly-chart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const weeksData = computeWeeklyHours(displayPeriod.start, displayPeriod.end);
            
            // 获取今天（清除时间部分，便于比较日期）
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // 筛选出已经结束的周（周日 <= 今天）
            const historyWeeks = weeksData.filter(w => w.end <= today);
            // 最近的已结束周（历史中最后一周）及其前一周
            let recentWeek = null;
            let prevWeek = null;
            if (historyWeeks.length >= 1) {
                recentWeek = historyWeeks[historyWeeks.length - 1];
                if (historyWeeks.length >= 2) {
                    prevWeek = historyWeeks[historyWeeks.length - 2];
                }
            }
            
            // 绘制柱状图（显示所有周，含未来周）
            if (!weeksData.length) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = '13px sans-serif';
                ctx.fillStyle = '#9aa3c0';
                ctx.textAlign = 'center';
                ctx.fillText('📭 当前周期暂无加班记录', canvas.width/2, canvas.height/2);
                document.getElementById('weekly-compare-text').innerHTML = '暂无周数据';
                document.getElementById('weekly-humor').innerHTML = '🥱 加班为0，快乐加倍';
                return;
            }
            
            const maxHours = Math.max(...weeksData.map(w => w.hours), 0.1);
            const barWidth = (canvas.width - 70) / weeksData.length * 0.7;
            const startX = 45;
            const baseY = canvas.height - 35;
            const maxHeight = canvas.height - 60;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#b8c4e6';
            ctx.lineWidth = 1;
            ctx.moveTo(30, 10);
            ctx.lineTo(30, baseY);
            ctx.lineTo(canvas.width-15, baseY);
            ctx.stroke();
            for (let i=0; i<weeksData.length; i++) {
                const w = weeksData[i];
                const h = w.hours;
                const barHeight = (h / maxHours) * maxHeight;
                const x = startX + i * (barWidth + 12);
                const y = baseY - barHeight;
                ctx.fillStyle = '#5866ef';
                ctx.fillRect(x, y, barWidth, barHeight);
                ctx.fillStyle = '#2d3c9e';
                ctx.font = '10px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.fillText(w.label, x + barWidth/2, baseY + 12);
                ctx.fillStyle = '#4d60ad';
                ctx.fillText(h.toFixed(1)+'h', x + barWidth/2, y-3);
            }
            
            // 同比分析（仅基于已结束周，避免未来周干扰）
            let compareHtml = '';
            let humorTxt = '';
            if (recentWeek) {
                if (prevWeek) {
                    const diff = recentWeek.hours - prevWeek.hours;
                    let percent = 0;
                    if (prevWeek.hours > 0) percent = (diff / prevWeek.hours) * 100;
                    else if (recentWeek.hours > 0) percent = 100;
                    const symbol = diff > 0 ? '📈 +' : (diff < 0 ? '📉 ' : '➖ ');
                    const absPercent = Math.abs(percent).toFixed(1);
                    compareHtml = `📅 结束周（${recentWeek.label}）加班 ${recentWeek.hours.toFixed(1)}h，同比前周（${prevWeek.label}） ${symbol}${diff !==0 ? Math.abs(diff).toFixed(1)+'h' : '持平'} ${diff !==0 ? `(${symbol}${absPercent}%)` : ''}`;
                    humorTxt = getHumorousComment(percent);
                } else {
                    compareHtml = `📅 结束周（${recentWeek.label}）加班 ${recentWeek.hours.toFixed(1)}h（无更早周可比）`;
                    humorTxt = recentWeek.hours > 0 ? "💪 开启加班征程，注意稳住节奏 💪" : "🌱 本周劳逸结合，下周继续保持 🌱";
                }
            } else {
                compareHtml = "📭 当前周期暂无已结束的完整周数据（未来周不纳入同比）";
                humorTxt = "🔮 未来战士，加班尚未发生 🔮";
            }
            document.getElementById('weekly-compare-text').innerHTML = compareHtml;
            document.getElementById('weekly-humor').innerHTML = humorTxt;
        }

        function updateSummary(start, end) {
            const data = loadData(), wage = getWage();
            let tempH=0, tempFee=0, holiH=0, holiFee=0, pubH=0, pubFee=0;
            getDaysArray(start, end).forEach(d => {
                const key = formatDateKey(d), val = parseFloat(data[key]?.h) || 0;
                if (!val) return;
                if (isPublicHoliday(d)) { pubH += val; pubFee += val*wage*3; }
                else if (isWeekend(d) || customHolidays.has(key)) { holiH += val; holiFee += val*wage*2; }
                else { tempH += val; tempFee += val*wage*1.5; }
            });
            const totalFee = tempFee + holiFee + pubFee;
            document.getElementById('summary').innerHTML = `
                🌙临时加班（1.5倍）：<strong>${tempH.toFixed(1)}</strong> 小时<br>
                ☀️假日加班（2倍）：<strong>${holiH.toFixed(1)}</strong> 小时<br>
                <span class="pub-row">🏛 国假加班（3倍）：<strong>${pubH.toFixed(1)}</strong> 小时</span><br>
                <span class="total-row">加班薪资合计：<strong>￥${totalFee.toFixed(2)}</strong></span>
            `;
        }

        function renderCalendar(start, end, today) {
            const days = getDaysArray(start, end);
            let html = ['<div class="calendar-header">'+["一","二","三","四","五","六","日"].map(d=>`<span>${d}</span>`).join('')+'</div>'];
            const blanks = (days[0].getDay() + 6) % 7;
            const cells = Array(blanks).fill('').concat(days);
            const data = loadData();
            let row = [];
            for (let i = 0; i < cells.length; i++) {
                if (typeof cells[i] === 'string') {
                    row.push('<div class="calendar-cell cell-blank"></div>');
                } else {
                    const d = cells[i], key = formatDateKey(d);
                    const isPub = isPublicHoliday(d), isWk = isWeekend(d);
                    const isToday = d.toDateString() === today.toDateString();
                    const isCustom = !isPub && !isWk && customHolidays.has(key);
                    const h = data[key]?.h;
                    let bar = '', valShow = '';
                    if (h != null && h > 0) {
                        const max = (isPub || isWk || isCustom) ? 8 : 4;
                        const frac = h / max;
                        const cls = frac > 0.99 ? 'full' : (frac > 0.66 ? 'warn' : '');
                        bar = `<div class="cell-ot-bar-bg"><div class="cell-ot-bar ${cls}" style="width:${Math.min(frac*100,100)}%"></div></div>`;
                        valShow = `<div class="cell-ot-num">${h}h</div>`;
                    }
                    const attrs = [isWk && !isPub ? 'data-weekend="1"' : '', isPub ? 'data-pubholiday="1"' : ''].filter(Boolean).join(' ');
                    const cls = `${isToday?' today':''}${isCustom?' custom-holiday':''}`;
                    row.push(`<div class="calendar-cell${cls}" tabindex="0" data-datekey="${key}" ${attrs} onclick="onCellClick('${key}')"><div class="cell-date">${d.getDate()}</div>${bar}${valShow}</div>`);
                }
                if ((i+1)%7 === 0 || i === cells.length-1) {
                    html.push(`<div class="calendar-row">${row.join('')}</div>`);
                    row = [];
                }
            }
            document.getElementById('calendar').innerHTML = html.join('');
        }

        function showWageInput() {
            const form = document.getElementById('wage-form'), input = document.getElementById('hourly-wage');
            if (input) input.value = getWage();
            form.onsubmit = e => {
                e.preventDefault();
                const v = parseInt(input.value.trim()) || 30;
                setWage(v);
                render();
                return false;
            };
        }

        // ========= 全局渲染 =========
        function render() {
            customHolidays = getCustomHolidaysSet();
            const now = new Date();
            const p = displayPeriod;
            document.getElementById('period-label').innerHTML = `考勤周期：${p.start.getFullYear()}/${p.start.getMonth()+1}/${p.start.getDate()} - ${p.end.getFullYear()}/${p.end.getMonth()+1}/${p.end.getDate()}`;
            const total = Math.round((p.end - p.start) / 86400000) + 1;
            const cur = Math.min(total, Math.max(0, Math.round((now - p.start) / 86400000) + 1));
            document.getElementById('progress-inner').style.width = `${(cur/total)*100}%`;
            renderCalendar(p.start, p.end, now);
            updateSummary(p.start, p.end);
            drawWeeklyChart();     // 修正后的柱状图+同比
            showWageInput();
            // 长按事件绑定
            const cal = document.getElementById('calendar');
            if (cal) {
                cal.removeEventListener('pointerdown', onPointerDown);
                cal.removeEventListener('pointerup', onPointerUp);
                cal.removeEventListener('pointermove', onPointerMove);
                cal.removeEventListener('pointercancel', cancelLongPress);
                if (holidayMarkEnabled) {
                    cal.addEventListener('pointerdown', onPointerDown);
                    cal.addEventListener('pointerup', onPointerUp);
                    cal.addEventListener('pointermove', onPointerMove);
                    cal.addEventListener('pointercancel', cancelLongPress);
                }
            }
        }

        window.onCellClick = function(key) {
            if (preventNextClickUntil && Date.now() < preventNextClickUntil) { preventNextClickUntil = 0; return; }
            const mask = document.getElementById('modal-mask'), input = document.getElementById('modal-input-hours'), label = document.getElementById('modal-date-label');
            const date = new Date(key + 'T00:00:00');
            const isPub = isPublicHoliday(date), isWk = isWeekend(date), isCustom = !isPub && !isWk && customHolidays.has(key);
            let max, type;
            if (isPub) { max=8; type='<span class="pub-badge">🏛 国假 · 3倍</span>'; }
            else if (isWk || isCustom) { max=8; type='（假日·2倍）'; }
            else { max=4; type='（工作日·1.5倍）'; }
            const data = loadData();
            input.value = data[key]?.h ?? '';
            input.max = max; input.min = 0;
            label.innerHTML = `${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()} ${type}，上限${max}h`;
            mask.style.display = 'flex';
            input.focus(); input.select();
            window.modalSaveHandler = () => {
                let v = parseFloat(input.value) || 0;
                v = Math.min(max, Math.max(0, v));
                if (!data[key]) data[key] = {};
                v === 0 ? delete data[key].h : data[key].h = v;
                saveData(data);
                mask.style.display = 'none';
                render();
            };
            document.getElementById('modal-save-btn').onclick = window.modalSaveHandler;
            document.getElementById('modal-cancel-btn').onclick = () => { mask.style.display = 'none'; };
            input.onkeydown = e => { if (e.key==='Enter') window.modalSaveHandler(); };
            mask.onclick = e => { if (e.target===mask) mask.style.display='none'; };
        };
        
        render();
        window.addEventListener('resize', () => drawWeeklyChart());
    </script>
</body>
</html>
